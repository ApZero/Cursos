<!DOCTYPE html>
<html lang="es-PY">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Terreno — Cursos y Progreso</title>
<meta name="description" content="Importá cursos con bloques y capítulos, seguí tu progreso, y guardalo todo localmente en tu teléfono.">
<meta name="theme-color" content="#3A2E22">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Terreno">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ===== LIBRARY VIEW ===== -->
  <section id="view-library" class="view">
    <header class="topbar">
      <div class="topbar-mark">
        <span class="mark-coil" aria-hidden="true"></span>
        <div>
          <h1>Terreno</h1>
          <p class="topbar-sub">Tus cursos, capa por capa</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="btn-search-open" class="btn-icon" type="button" aria-label="Buscar en todos los cursos">⌕</button>
        <button id="btn-import" class="btn btn-accent" type="button">Importar curso</button>
      </div>
    </header>

    <div id="library-empty" class="empty-state hidden">
      <div class="empty-illustration" aria-hidden="true">
        <svg viewBox="0 0 120 90" width="120" height="90">
          <rect x="10" y="40" width="100" height="40" rx="6" fill="none" stroke="#B7A98C" stroke-width="2"/>
          <path d="M20 40 C 40 20, 80 20, 100 40" fill="none" stroke="#C1613C" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h2>Todavía no hay cursos</h2>
      <p>Importá un archivo de curso (.json) para empezar. El de Vermicompostaje 101 está incluido — buscalo en la carpeta <code>courses/</code> del repositorio.</p>
      <button class="btn btn-outline" id="btn-import-empty" type="button">Importar curso</button>
    </div>

    <div id="course-grid" class="course-grid"></div>

    <footer class="library-footer">
      <button id="btn-backup" class="btn-link" type="button">Exportar copia de seguridad completa</button>
      <button id="btn-restore" class="btn-link" type="button">Restaurar copia de seguridad</button>
    </footer>
  </section>

  <!-- ===== COURSE VIEW ===== -->
  <section id="view-course" class="view hidden">
    <header class="course-header">
      <button id="btn-back" class="btn-icon" type="button" aria-label="Volver a la biblioteca">←</button>
      <div class="course-header-text">
        <h1 id="course-title"></h1>
        <p id="course-subtitle"></p>
      </div>
      <button id="btn-course-search-open" class="btn-icon" type="button" aria-label="Buscar en todos los cursos">⌕</button>
      <button id="btn-course-menu" class="btn-icon" type="button" aria-label="Opciones del curso">⋮</button>
    </header>

    <div class="course-progress-panel">
      <div class="layer-progress" id="layer-progress" aria-hidden="true">
        <div class="layer-progress-fill" id="layer-progress-fill"></div>
      </div>
      <div class="progress-meta">
        <span id="progress-count" class="mono"></span>
        <span id="progress-pct" class="mono progress-pct"></span>
      </div>
    </div>

    <div id="course-menu" class="course-menu hidden">
      <button data-action="export-progress" type="button">Exportar progreso</button>
      <button data-action="export-bundle" type="button">Exportar curso + progreso</button>
      <button data-action="reimport-content" type="button">Reemplazar contenido del curso</button>
      <button data-action="delete-course" type="button" class="danger">Eliminar curso</button>
    </div>

    <div id="blocks-list" class="blocks-list"></div>

    <section class="final-challenge" id="final-challenge">
      <h2>Desafío final</h2>
      <ul id="final-challenge-list"></ul>
    </section>

    <section class="course-resources" id="course-resources">
      <h2>Recursos</h2>
      <div id="resources-books"></div>
      <div id="resources-channels"></div>
    </section>
  </section>

</div>

<input type="file" id="file-input-course" accept="application/json,.json" class="hidden-input">
<input type="file" id="file-input-restore" accept="application/json,.json" class="hidden-input">

<div id="search-overlay" class="search-overlay hidden">
  <div class="search-bar">
    <span class="search-bar-icon" aria-hidden="true">⌕</span>
    <input type="text" id="search-input" placeholder="Buscar en todos los cursos…" autocomplete="off">
    <button id="btn-search-close" class="btn-icon" type="button" aria-label="Cerrar búsqueda">✕</button>
  </div>
  <div id="search-results" class="search-results"></div>
</div>

<div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
